<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verifone P/N Decoders</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --bg:#161a23;
  --panel:#1f2531;
  --panel-2:#252c3a;
  --line:#333c4d;
  --text:#e7eaf1;
  --muted:#8b94a7;
  --amber:#e8a33d;
  --teal:#4fd1c5;
  --mono:'IBM Plex Mono', monospace;
  --sans:'Inter', sans-serif;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  padding:48px 20px 60px;
}
.wrap{max-width:920px;margin:0 auto;}
h1{
  font-family:var(--mono);
  font-size:19px;
  font-weight:600;
  letter-spacing:0.02em;
  margin:0 0 4px;
  color:var(--text);
}
.sub{
  color:var(--muted);
  font-size:13px;
  margin:0 0 36px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}
@media (max-width:640px){.grid{grid-template-columns:1fr;}}
.product-card{
  display:block;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:10px;
  padding:28px 24px;
  text-decoration:none;
  color:var(--text);
  transition:border-color 0.15s, transform 0.15s;
}
.product-card:hover{border-color:var(--amber);transform:translateY(-2px);}
.product-icon{
  width:44px;
  height:44px;
  border-radius:8px;
  background:var(--panel-2);
  border:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:var(--mono);
  font-weight:700;
  font-size:15px;
  color:var(--amber);
  margin-bottom:16px;
}
.product-name{
  font-family:var(--mono);
  font-size:16px;
  font-weight:600;
  margin:0 0 6px;
}
.product-desc{
  font-size:13px;
  color:var(--muted);
  margin:0;
  line-height:1.5;
}
</style>
</head>
<body>
<div class="wrap">
  <h1>P/N Decoders</h1>
  <p class="sub">Pick a product line to decode a Part Number, or build one from a spec.</p>

  <div class="grid">
    <a class="product-card" href="ux700-4g.html">
      <div class="product-icon">4G</div>
      <p class="product-name">UX700-4G</p>
      <p class="product-desc">Decode / encode P/N, Model Name, Description, and Security HWID for UX700-4G.</p>
    </a>
    <a class="product-card" href="ux600-a.html">
      <div class="product-icon">A</div>
      <p class="product-name">UX600-A</p>
      <p class="product-desc">Decode / encode P/N, Model Name, Description, and Security HWID for UX600-A.</p>
    </a>
  </div>
</div>
</body>
</html>
